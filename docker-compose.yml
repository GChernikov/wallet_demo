services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: wallet_demo
      MYSQL_ALLOW_EMPTY_PASSWORD: yes
    ports:
      - "3306:3306"
    command: >
      --innodb-buffer-pool-size=1G
      --innodb-redo-log-capacity=1073741824
      --innodb-flush-log-at-trx-commit=1
      --innodb-flush-method=O_DIRECT
      --sync-binlog=1
      --max-connections=500
      --skip-name-resolve
      --innodb-thread-concurrency=0
      --performance-schema=ON
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
